# ---------------------------------------------------------------------------
# Namespace
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: ate-env
---
# ---------------------------------------------------------------------------
# Configuration
# ---------------------------------------------------------------------------
# Mounted into the container at /etc/ate-env and passed via `--config`. The
# ate.ateapi endpoint points at the Agent Substrate control API in the
# ate-system namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ate-env-config
  namespace: ate-env
data:
  config.yaml: |
    listen: ":7777"
    environments:
      - name: "bash-env"
        template: "bash-env-template"
        allowed_tools:
          - "bash"
          - "read_file"
          - "write_file"
          - "list_dir"
---
# ---------------------------------------------------------------------------
# ate-env service
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ate-env
  namespace: ate-env
  labels:
    app: ate-env
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ate-env
  template:
    metadata:
      labels:
        app: ate-env
    spec:
      containers:
        - name: ate-env
          image: ${ATE_ENV_IMAGE}
          command: ["/ate-env", "serve", "--config", "/etc/ate-env/config.yaml"]
          ports:
            - containerPort: 7777
          readinessProbe:
            httpGet:
              path: /healthz
              port: 7777
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/ate-env
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ate-env-config
---
# ---------------------------------------------------------------------------
# Agent Substrate Actor Template
# ---------------------------------------------------------------------------
apiVersion: ate.gke.io/v1alpha1
kind: ActorTemplate
metadata:
  name: bash-env-template
  namespace: default
spec:
  workerPoolRef:
    name: bash-env-workerpool

