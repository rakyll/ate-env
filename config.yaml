# Example configuration for the Agent Substrate environment service.

# Address/port for the HTTP environment service to listen on
listen: ":8080"

# Predefined environments mapping client-facing names to Agent Substrate templates.
environments:
  - name: "bash-env"
    template: "bash-env-template"
    enabled_tools:
      - "bash"
      - "read_file"
      - "write_file"
      - "list_dir"

ate:
  # Address of the Agent Substrate ateapi gRPC server
  ateapi: "ateapi.ate-system.svc.cluster.local:443"

  # Agent Substrate atespace to create/resume actors
  atespace: "default"